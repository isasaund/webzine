<html>
    <head>
        <title>Flex Practice</title>
        <title>Title</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body class="index-page">
        <div class="telescope-wrap">
            <span class="telescope-message">Climb the steps to the dusty old observatory</span>
            <a href="window/window.html" class="telescope-link">
                <span class="telescope-hotpoint" aria-hidden="true"></span>
                <img src="window/telescope.png" class="telescope-corner" alt="Telescope">
            </a>
        </div>
        <div class="mailboxes-center">
            <img src="mailboxes.png" class="mailboxes-img" alt="Mailboxes">
            <a href="window/phone room.html" class="payphone-link" aria-label="Go to Phone Room"><p class="payphone-label">Payphone</p></a>
            <a href="valentines/valentines.html" class="mailboxes-hitarea" aria-label="Go to Valentines"></a>
        </div>
        <p class="hotel-caption">Welcome to the Coccinelle Hotel</p>
        <div class="hotel-center">
            <div class="hotel-stack">
                <img src="window/hotel.png" class="hotel-img" alt="Hotel">
                <p class="attic-label">Attic</p>
                <p class="theater-label">Theater</p>
                <p class="mail-label">Mail Room</p>
                <a href="window/phone room.html" class="phones-wrapper" aria-label="Go to Phone Room">
                    <span class="phones-hotpoint" aria-hidden="true"></span>
                    <img src="window/phones.png" class="phones-img" alt="Phones">
                </a>
                <a href="attic-black.html" class="attic-link" aria-label="Go to Attic">
                    <img src="attic.png" class="attic-on-hotel" alt="Attic">
                </a>
                <a href="red room.html" class="tv-room-link">
                    <span class="tv-room-hotpoint" aria-hidden="true"></span>
                    <img src="tv room (2).png" class="tv-on-hotel" alt="TV room">
                </a>
                <span class="door-link" aria-hidden="true">
                    <img src="door.png.png" class="door-bottom" alt="Door">
                </span>
                <a href="elevator.html" class="bell-link" aria-label="Summon elevator">
                    <img src="bell.png" class="bell-img" alt="" aria-hidden="true">
                </a>
                <p class="dumbwaiter-label">summon the dumbwaiter</p>
            </div>
        </div>
    </body>
</html>
